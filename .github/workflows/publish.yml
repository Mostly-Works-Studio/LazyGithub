name: Publish to Chrome Web Store

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump
        id: version_check
        if: github.event_name == 'push'
        run: |
          CURRENT=$(jq -r '.version' manifest.json)
          PREVIOUS=$(git show HEAD~1:manifest.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          echo "current=$CURRENT"
          echo "previous=$PREVIOUS"
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Package extension
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        run: |
          zip -r extension.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude ".idea/*" \
            --exclude ".DS_Store" \
            --exclude "*.md" \
            --exclude "LICENSE"

      - name: Upload & publish to Chrome Web Store
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        run: npx chrome-webstore-upload-cli@latest upload --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
